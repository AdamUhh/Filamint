name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
          - os: windows-latest
            platform: windows
          - os: macos-latest
            platform: darwin

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Linux dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            nsis \
            libfuse2 \
            pkg-config \
            build-essential

      - name: Install Windows dependencies
        if: matrix.platform == 'windows'
        shell: pwsh
        run: choco install nsis -y

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@latest

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm install

      - name: Package (Linux)
        if: matrix.platform == 'linux'
        run: wails3 package

      - name: Package (macOS)
        if: matrix.platform == 'darwin'
        run: wails3 package

      - name: Package (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: wails3 package

      - name: Upload Linux artifacts
        if: matrix.platform == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: linux-artifacts
          path: |
            bin/filamint
            bin/filamint-x86_64.AppImage
            bin/filamint.deb

      - name: Upload Windows artifacts
        if: matrix.platform == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifacts
          path: bin/filamint*.exe

      - name: Upload macOS artifacts
        if: matrix.platform == 'darwin'
        uses: actions/upload-artifact@v4
        with:
          name: darwin-artifacts
          path: bin/filamint*.dmg

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Generate latest.json
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          REPO="${{ github.repository }}"
          cat > latest.json << EOF
          {
            "version": "$VERSION",
            "notes": "Release v$VERSION",
            "pub_date": "$DATE",
            "platforms": {
              "windows-x86_64": {
                "url": "https://github.com/$REPO/releases/download/v$VERSION/filamint-windows-amd64.exe"
              },
              "darwin-x86_64": {
                "url": "https://github.com/$REPO/releases/download/v$VERSION/filamint-darwin-amd64.dmg"
              },
              "darwin-aarch64": {
                "url": "https://github.com/$REPO/releases/download/v$VERSION/filamint-darwin-arm64.dmg"
              },
              "linux-x86_64-binary": {
                "url": "https://github.com/$REPO/releases/download/v$VERSION/filamint"
              },
              "linux-x86_64": {
                "url": "https://github.com/$REPO/releases/download/v$VERSION/filamint-x86_64.AppImage"
              }
            }
          }
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: |
            artifacts/linux-artifacts/filamint
            artifacts/linux-artifacts/filamint-x86_64.AppImage
            artifacts/linux-artifacts/filamint.deb
            artifacts/windows-artifacts/*.exe
            artifacts/darwin-artifacts/*.dmg
            latest.json
